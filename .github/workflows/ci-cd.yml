name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 1234
          POSTGRES_DB: predict_logs_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest pytest-mock
          pip install -r requirements.txt
      
      - name: Lint with flake8
        run: flake8 app/ --count --max-complexity=10 --statistics
      
      - name: Test with pytest
        env:
          DB_HOST: localhost
          DB_USER: postgres
          PGPASSWORD: 1234
          DB_NAME: predict_logs_db
          OLLAMA_HOST: localhost:11434
        run: pytest my_tests/ -v

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ML Service Image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: ghcr.io/avandrevv/ml-service:latest